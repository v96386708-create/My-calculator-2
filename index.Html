<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Advanced Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); /* Premium Background */
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .calculator {
            background: rgba(23, 23, 28, 0.85); /* Glass effect */
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 30px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #display {
            width: 100%;
            height: 70px;
            background-color: transparent;
            color: #ffffff;
            font-size: 38px;
            text-align: right;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
            border: none;
            outline: none;
            letter-spacing: 1px;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        button {
            height: 60px;
            border-radius: 15px; /* Thode square round buttons */
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }
        button.number {
            background-color: #2b2b36;
            color: #ffffff;
        }
        button.number:hover {
            background-color: #3f3f4e;
        }
        button.operator {
            background: linear-gradient(45deg, #ff8a00, #e52e71); /* Gradient colors */
            color: #ffffff;
        }
        button.operator:hover {
            opacity: 0.8;
        }
        button.top-btn {
            background-color: #6c757d;
            color: #ffffff;
        }
        button.adv-btn {
            background-color: #17a2b8;
            color: #ffffff;
        }
        button:active {
            transform: scale(0.92);
        }
        button.equal {
            background: linear-gradient(45deg, #00b09b, #96c93d); /* Green Gradient for Equal */
            color: #ffffff;
            grid-column: span 2;
        }
        
        /* History Section */
        .history-container {
            margin-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
            max-height: 120px;
            overflow-y: auto;
        }
        .history-title {
            color: #00b09b;
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        .clear-history {
            color: #ff4757;
            cursor: pointer;
            font-size: 13px;
        }
        .history-item {
            color: #ced6e0;
            font-size: 16px;
            text-align: right;
            margin-bottom: 8px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }
        /* Custom Scrollbar for history */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 5px; }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" placeholder="0" readonly>
    
    <div class="buttons">
        <button class="top-btn" onclick="clearDisplay()">AC</button>
        <button class="top-btn" onclick="backspace()">⌫</button>
        <button class="adv-btn" onclick="calcPercentage()">%</button>
        <button class="operator" onclick="appendValue('/')">÷</button>
        
        <button class="adv-btn" onclick="calcSquareRoot()">√</button>
        <button class="adv-btn" onclick="calcSquare()">x²</button>
        <button class="number" onclick="appendValue('(')">(</button>
        <button class="number" onclick="appendValue(')')">)</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('*')">×</button>
        
        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('-')">−</button>
        
        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>
        
        <button class="number" onclick="appendValue('0')">0</button>
        <button class="number" onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>

    <div class="history-container">
        <div class="history-title">
            <span>Recent History</span>
            <span class="clear-history" onclick="clearHistory()">Clear All</span>
        </div>
        <div id="history-list"></div>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    const historyList = document.getElementById('history-list');

    function appendValue(val) {
        display.value += val;
    }

    function clearDisplay() {
        display.value = '';
    }

    function backspace() {
        display.value = display.value.slice(0, -1);
    }

    // Advanced Functions
    function calcPercentage() {
        if(display.value) {
            let result = eval(display.value) / 100;
            addHistoryItem(display.value + " % = " + result);
            display.value = result;
        }
    }

    function calcSquareRoot() {
        if(display.value) {
            let result = Math.sqrt(eval(display.value));
            addHistoryItem("√(" + display.value + ") = " + result);
            display.value = result;
        }
    }

    function calcSquare() {
        if(display.value) {
            let result = Math.pow(eval(display.value), 2);
            addHistoryItem("(" + display.value + ")² = " + result);
            display.value = result;
        }
    }

    function calculate() {
        try {
            if (display.value !== "") {
                let expression = display.value;
                let result = eval(expression);
                
                // Formatting decimals so it doesn't look messy
                if(!Number.isInteger(result)) {
                    result = parseFloat(result.toFixed(5));
                }
                
                addHistoryItem(expression + " = " + result);
                display.value = result;
            }
        } catch (error) {
            display.value = 'Error';
            setTimeout(() => { clearDisplay() }, 1500); // 1.5 second me error khud saaf ho jayega
        }
    }

    function addHistoryItem(text) {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerText = text;
        historyList.insertBefore(item, historyList.firstChild);
    }

    function clearHistory() {
        historyList.innerHTML = '';
    }

    // Keyboard support: Taaki keyboard ki keys se bhi type ho sake
    document.addEventListener('keydown', function(event) {
        const key = event.key;
        if (/[0-9+\-*/().]/.test(key)) {
            appendValue(key);
        } else if (key === 'Enter') {
            calculate();
        } else if (key === 'Backspace') {
            backspace();
        } else if (key === 'Escape') {
            clearDisplay();
        }
    });
</script>

</body>
</html>
